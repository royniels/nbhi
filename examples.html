<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Platform to manage user accounts and business cards">
  <title>External template examples</title>

  <style>
    body {
      background-color: #333;
      color: white;
      font-family: 'Helvetica';
    }
  </style>
</head>

<body>
  <main class="container">
    <hgroup>
      <h1>Examples</h1>
      <p>Please inspect the source for implementation details</p>
    </hgroup>

    <hr>

    <h2>Slots</h2>

    <x-slots>
      Default slot overwritten with HTML
      <span slot="title">Named slot overwritten via HTML</span>
    </x-slots>

    <x-slots class="js-slots"></x-slots>

    <hr>

    <h2>Attributes</h2>

    <x-attr value="Attributes set via HTML" disabled></x-attr><br>
    <x-attr class="js-attr"></x-attr>

    <hr>

    <h2>Array data</h2>

    <h4>Table</h4>
    <x-table></x-table>

    <h4>List</h4>
    <x-ul></x-ul>

    <h4>Select</h4>
    <x-select name="selector" data-id="id"></x-select>

    <h4>Custom [child] attribute</h4>
    <x-child></x-child>

    <h4>Custom nested web component (default slot)</h4>
    <x-nested-unnamed></x-nested-unnamed>

    <h4>Custom nested web component (named slots)</h4>
    <x-nested-named></x-nested-named>

  </main>

  <script type="module">
    const start = performance.now();

    import { initialize, update } from '/javascript/index.js';
    await initialize({ prefix: 'x', source: '/examples' });

    const updater = update('.js-slots');
    updater('Default slot overwritten with JS');
    update('.js-slots')({ title: 'Named slot overwritten with JS' });
    update('.js-attr')({ $value: 'Attributes set via JS', $disabled: true })

    update('x-table')([
      { em: 'Italic', strong: 'and bold 1', description: 'My description 1', '$data-id': 1 },
      { em: 'Italic', strong: 'and bold 2', description: 'My description 2', '$data-id': 2 },
    ]);

    update('x-ul')([
      { em: 'Italic', strong: 'and bold 1' },
      { em: 'Italic', strong: 'and bold 2' },
    ]);

    update('x-select')([
      { label: 'Option 1', $value: 'value 1' },
      { label: 'Option 2', $value: 'Value 2' },
    ]);

    update('x-select')({ $value: 'Value 2' });

    update('x-child')([
      { title: 'My title 1', description: 'My description 1' },
      { title: 'My title 2', description: 'My description 2' },
    ]);

    update('x-nested-unnamed')(['My title 1', 'My title 2']);

    update('x-nested-named')([
      { title: 'My title 1', description: 'My description 1' },
      { title: 'My title 2', description: 'My description 2' },
    ]);

    const end = performance.now();
    console.log(`Registered all components in ${Math.round(end - start)} ms`);
  </script>

</body>

</html>
